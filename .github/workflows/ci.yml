name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x
    - run: dotnet test src/PT.Tests/PT.Tests.csproj -c Release

  publish:
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: windows-latest,   rid: win-x64 }
          - { os: windows-latest,   rid: win-arm64 }
          - { os: ubuntu-latest,    rid: linux-x64 }
          - { os: ubuntu-24.04-arm, rid: linux-arm64 }
          - { os: macos-latest,     rid: osx-arm64 }
          - { os: macos-latest,     rid: osx-x64 }

    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x
    - name: Publish pt-tui
      run: dotnet publish src/PT.Tui/PT.Tui.csproj -r ${{ matrix.rid }} -c Release
    - uses: actions/upload-artifact@v4
      with:
        name: pt-tui-${{ matrix.rid }}
        path: src/PT.Tui/bin/Release/net10.0/${{ matrix.rid }}/publish/

  release:
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/download-artifact@v4
      with:
        path: artifacts
    - name: Create release archives
      run: |
        cd artifacts
        for dir in pt-tui-*/; do
          name="${dir%/}"
          tar -czf "../${name}.tar.gz" -C "$dir" .
        done
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: build-${{ github.run_number }}
        name: Build ${{ github.run_number }}
        generate_release_notes: true
        files: pt-tui-*.tar.gz
