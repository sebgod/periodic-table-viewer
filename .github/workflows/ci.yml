name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x
    - run: dotnet test src/PT.Tests/PT.Tests.csproj -c Release

  publish:
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    strategy:
      fail-fast: false
      matrix:
        rid: [ win-x64, win-arm64 ]

    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x
    - name: Publish pt-tui
      run: dotnet publish src/PT.Tui/PT.Tui.csproj -r ${{ matrix.rid }} -c Release
    - uses: actions/upload-artifact@v4
      with:
        name: pt-tui-${{ matrix.rid }}
        path: src/PT.Tui/bin/Release/net10.0-windows/${{ matrix.rid }}/publish/

  release:
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/download-artifact@v4
      with:
        path: artifacts
    - name: Create release archives
      run: |
        cd artifacts
        for dir in */; do
          name="${dir%/}"
          (cd "$dir" && zip -r "../../${name}.zip" .)
        done
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: build-${{ github.run_number }}
        name: Build ${{ github.run_number }}
        generate_release_notes: true
        files: pt-tui*.zip
